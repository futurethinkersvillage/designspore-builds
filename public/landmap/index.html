<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wells Gray Golf &amp; RV Resort — Development Plan</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{ --bg:#14180f; --panel:#1d2417; --ink:#f3f1e7; --muted:#a9b39a; --accent:#cfa64b; --line:#2c3522; }
  html,body{height:100%;margin:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  #map{position:absolute;top:0;right:0;bottom:0;left:0;background:var(--bg);transition:width .28s ease}
  /* media panel pushes the map + controls instead of overlaying (width, not right — #map's inset:0 over-constrains right) */
  body.media-open #map{width:calc(100% - 540px)}
  body.media-open #controls{right:554px}
  .panel{position:absolute;z-index:1000;background:rgba(29,36,23,.94);color:var(--ink);
    border:1px solid var(--line);border-radius:12px;backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(0,0,0,.45)}
  #title{top:14px;left:14px;max-width:320px;padding:14px 18px}
  #title h1{margin:0 0 4px;font-size:18px;line-height:1.2}
  #title .sub{color:var(--muted);font-size:12.5px;line-height:1.45}
  #title .brand{margin-top:9px;font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase}
  #controls{top:14px;right:14px;width:290px;padding:14px 16px;max-height:calc(100% - 28px);overflow:auto;transition:right .28s ease}
  #controls h2{margin:2px 0 8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .basemap-row{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
  .bm{flex:1;min-width:58px;text-align:center;font-size:11.5px;padding:7px 4px;border:1px solid var(--line);border-radius:8px;cursor:pointer;color:var(--muted)}
  .bm.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:600}
  .pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .pill{font-size:11.5px;padding:6px 10px;border:1px solid var(--line);border-radius:999px;cursor:pointer;color:var(--muted)}
  .pill.on{background:rgba(207,166,75,.22);border-color:var(--accent);color:var(--ink)}
  .pill.partial{border-color:var(--accent);color:var(--ink)}
  .sec{margin:14px 0 6px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-top:1px solid var(--line);padding-top:10px}
  /* tree */
  #tree{margin-top:6px;font-size:12.5px}
  .grp{margin:1px 0}
  .ghead{display:flex;align-items:center;gap:7px;padding:4px 3px;border-radius:7px;cursor:default}
  .ghead:hover{background:rgba(255,255,255,.05)}
  .caret{width:12px;font-size:10px;color:var(--muted);cursor:pointer;user-select:none;transition:transform .12s}
  .grp.collapsed>.ghead .caret{transform:rotate(-90deg)}
  .grp.collapsed>.gbody{display:none}
  .gname{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .gbody{margin-left:13px;border-left:1px solid var(--line);padding-left:7px}
  label.row{display:flex;align-items:center;gap:8px;padding:3px;border-radius:7px;cursor:pointer}
  label.row:hover{background:rgba(255,255,255,.05)}
  label.row input{accent-color:var(--accent);width:14px;height:14px;flex:0 0 auto}
  label.row .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row.opt .nm{font-style:normal}
  .sw{width:13px;height:13px;border-radius:3px;flex:0 0 auto;border:1px solid rgba(255,255,255,.25)}
  .sw.line{height:0;border-top-width:3px;border-radius:0}
  .display-row{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
  .btn{font-size:12px;padding:7px 11px;border:1px solid var(--line);border-radius:8px;cursor:pointer;color:var(--ink);background:rgba(255,255,255,.04)}
  .btn:hover{border-color:var(--accent)}
  .chk{display:flex;align-items:center;gap:7px;font-size:12.5px;cursor:pointer}
  .chk input{accent-color:var(--accent)}
  #toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:1200;background:var(--accent);color:#1a1a1a;
    font-weight:600;font-size:13px;padding:9px 16px;border-radius:999px;opacity:0;transition:opacity .25s;pointer-events:none}
  #toast.show{opacity:1}
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--ink);border-radius:10px}
  .leaflet-popup-tip{background:var(--panel)}
  .pp b{color:var(--accent)} .pp .t{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .maplbl{background:transparent;border:none;box-shadow:none;color:#fff;font-weight:600;font-size:11px;text-shadow:0 0 3px #000,0 0 3px #000,0 0 2px #000;padding:0}
  .maplbl.dev{font-size:13px;font-weight:700}
  .leaflet-tooltip.maplbl:before{display:none}
  body.nolabels .maplbl{display:none!important}
  /* media markers + sidebar */
  .media-badge{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;
    background:var(--accent);color:#1a1a1a;font-size:14px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5);cursor:pointer}
  #mediapanel{position:absolute;top:0;right:0;height:100%;width:540px;max-width:92%;z-index:1500;background:rgba(20,24,15,.97);
    color:var(--ink);border-left:1px solid var(--line);box-shadow:-10px 0 30px rgba(0,0,0,.5);transform:translateX(100%);
    transition:transform .28s ease;overflow:auto;backdrop-filter:blur(6px)}
  #mediapanel.open{transform:translateX(0)}
  #mediapanel .mp-head{position:sticky;top:0;z-index:3;display:flex;align-items:center;gap:10px;background:rgba(20,24,15,.98);padding:11px 42px 11px 18px;border-bottom:1px solid var(--line)}
  #mediapanel .mp-stage{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700}
  #mediapanel .mp-prog{margin-left:auto;font-size:11.5px;color:var(--muted)}
  #mediapanel .mp-close{position:absolute;top:7px;right:13px;font-size:23px;cursor:pointer;color:var(--muted);line-height:1;z-index:4}
  #mediapanel .mp-close:hover{color:var(--ink)}
  #mediapanel .mp-body{padding:0 0 6px}
  #mediapanel .mp-nav{position:sticky;bottom:0;z-index:3;display:flex;gap:10px;padding:12px 16px;background:rgba(20,24,15,.98);border-top:1px solid var(--line)}
  #mediapanel .mp-nav button{padding:13px 10px;border-radius:10px;font-size:14.5px;font-weight:700;cursor:pointer;border:1px solid var(--line)}
  #mediapanel .mp-back{flex:1;background:rgba(255,255,255,.05);color:var(--ink)}
  #mediapanel .mp-back:hover{border-color:var(--accent)}
  #mediapanel .mp-back[disabled]{opacity:.3;cursor:default}
  #mediapanel .mp-next{flex:1.5;background:var(--accent);color:#1a1a1a;border-color:var(--accent)}
  #mediapanel .mp-next:hover{filter:brightness(1.07)}
  /* tour slide */
  .slide{display:flex;flex-direction:column;gap:13px;padding:4px 20px 22px}
  .slide .s-eyebrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;min-height:16px}
  .slide .s-badge{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid var(--accent);color:var(--accent);font-weight:700}
  .slide .s-badge.now{color:#9ccc65;border-color:#9ccc65}
  .slide .s-stage{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .slide .s-title{margin:0;font-family:Georgia,'Times New Roman',serif;font-size:26px;line-height:1.12;font-weight:600;color:var(--ink)}
  .slide figure{margin:0}
  .slide .s-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;border:1px solid var(--line);display:block;background:#0d0f0a}
  .slide .s-cap{font-size:11px;color:var(--muted);margin-top:5px;text-align:right;font-style:italic}
  .slide .s-ph{width:100%;aspect-ratio:4/3;border-radius:12px;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;padding:10px;background:rgba(255,255,255,.03)}
  .slide .s-lead{margin:0;font-size:15px;line-height:1.5;color:var(--ink);font-weight:500}
  .slide .s-points{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
  .slide .s-points li{position:relative;padding-left:17px;font-size:13.5px;line-height:1.45;color:var(--ink)}
  .slide .s-points li:before{content:"";position:absolute;left:1px;top:6px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .slide .s-cta{margin-top:4px;display:block;text-align:center;padding:11px 14px;border:1px solid var(--accent);border-radius:10px;color:var(--accent);text-decoration:none;font-size:14px;font-weight:600}
  .slide .s-cta:hover{background:var(--accent);color:#1a1a1a}
  /* phase divider stop */
  .slide.divider{gap:15px}
  .slide.divider .s-phase{display:flex;align-items:center;gap:11px;margin-bottom:-2px}
  .slide.divider .s-phase-k{font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:800;white-space:nowrap}
  .slide.divider .s-phase-rule{flex:1;height:1px;background:linear-gradient(90deg,var(--accent),rgba(255,255,255,.06))}
  .slide.divider .s-title{font-size:31px}
  .slide.divider .s-img{aspect-ratio:16/9;box-shadow:0 0 0 1px var(--accent),0 10px 30px rgba(0,0,0,.4)}
  .slide.divider .s-lead{font-size:16px}
  /* tour highlight ping */
  .tp-wrap{pointer-events:none}
  .tour-ping{position:relative;width:90px;height:90px}
  .tour-ping .ring{position:absolute;left:50%;top:50%;width:26px;height:26px;margin:-13px 0 0 -13px;border:3px solid var(--accent);border-radius:50%;opacity:0;animation:tping 1.4s cubic-bezier(.2,.6,.3,1) 3}
  .tour-ping .ring.r2{animation-delay:.7s}
  .tour-ping .dot{position:absolute;left:50%;top:50%;width:12px;height:12px;margin:-6px 0 0 -6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(0,0,0,.5),0 0 14px var(--accent)}
  @keyframes tping{0%{transform:scale(.35);opacity:.95}80%{opacity:.28}100%{transform:scale(3.6);opacity:0}}
  /* start lightbox */
  #introbox{position:absolute;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;background:rgba(8,10,6,.62);backdrop-filter:blur(3px);padding:20px}
  #introbox .ib-card{max-width:440px;width:100%;background:rgba(20,24,15,.98);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);padding:26px}
  #introbox .ib-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;text-align:center}
  #introbox .ib-title{margin:0 0 14px;font-family:Georgia,'Times New Roman',serif;font-size:27px;line-height:1.12;color:var(--ink);text-align:center}
  #introbox .ib-body{font-size:14.5px;line-height:1.55;color:var(--ink)}
  #introbox .ib-body p{margin:0 0 10px}
  #introbox .ib-btn{display:block;width:100%;margin-top:18px;padding:13px;border:0;border-radius:10px;background:var(--accent);color:#1a1a1a;font-size:15px;font-weight:700;cursor:pointer}
  #introbox .ib-btn:hover{filter:brightness(1.07)}
  #introbox .ib-skip{margin-top:12px;text-align:center;font-size:13px;color:var(--muted);cursor:pointer}
  #introbox .ib-skip:hover{color:var(--ink)}
  @media(max-width:640px){ #introbox .ib-card{padding:20px 16px} #introbox .ib-title{font-size:22px} }
  #mediapanel .mp-img{width:100%;border-radius:10px;margin-bottom:8px;border:1px solid var(--line);background:#0d0f0a;display:block}
  #mediapanel .mp-ph{width:100%;aspect-ratio:16/10;border-radius:10px;margin-bottom:8px;border:1px dashed var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;background:rgba(255,255,255,.03)}
  #mediapanel .mp-write{font-size:13.5px;line-height:1.5;color:var(--ink);margin:10px 0}
  #mediapanel .mp-write p{margin:0 0 9px}
  #mediapanel iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:10px;margin:6px 0}
  #mediapanel .mp-link{display:inline-block;margin-top:8px;padding:9px 13px;border:1px solid var(--accent);border-radius:8px;
    color:var(--accent);text-decoration:none;font-size:13px}
  #mediapanel .mp-link:hover{background:var(--accent);color:#1a1a1a}
  @media(max-width:640px){ #title{max-width:none;left:10px;right:10px;top:10px} #controls{right:10px;left:10px;top:auto;bottom:10px;width:auto;max-height:48%} #mediapanel{width:100%} body.media-open #map{width:100%} body.media-open #controls{right:10px} }
  #legend{position:absolute;left:12px;bottom:12px;z-index:1200;display:none;padding:9px 11px 8px;font-size:12px;max-width:240px}
  #legend .lg-h{font-weight:700;color:var(--ink);margin-bottom:6px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase}
  #legend .lg-list{max-height:42vh;overflow:auto;padding-right:2px}
  #legend .lg-row{display:flex;align-items:center;gap:7px;color:var(--ink);margin:3px 0;line-height:1.15}
  #legend .lg-sub{margin-top:6px;font-weight:600;color:var(--accent);font-size:11px}
  #legend .lg-sw{width:13px;height:13px;flex:none}
  #legend .lg-poly{border-radius:2px;border:1.5px solid #fff}
  #legend .lg-dot{border-radius:50%;border:1.5px solid #fff}
  #legend .lg-line{height:3px;width:15px;border-radius:2px;align-self:center}
  @media(max-width:640px){ #legend{display:none!important} }
  /* guided tour strip */
  #tourbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:1600;display:flex;align-items:center;gap:10px;padding:0}
  #tourbar .tb-prog{position:absolute;left:0;bottom:-1px;height:2px;background:var(--accent);width:0;transition:width .45s ease}
  #tourbar .tb-btn{padding:11px 22px;border:0;border-radius:999px;background:var(--accent);color:#1a1a1a;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.45)}
  #tourbar .tb-btn:hover{filter:brightness(1.07)}
  #tourbar .tb-lead{color:var(--muted);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #tourbar .tb-nav{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);cursor:pointer;font-size:16px;line-height:1;flex:none}
  #tourbar .tb-nav:hover{border-color:var(--accent)}
  #tourbar .tb-nav[disabled]{opacity:.35;cursor:default}
  #tourbar .tb-mid{flex:1;display:flex;align-items:center;gap:10px;justify-content:center;min-width:0}
  #tourbar .tb-badge{font-size:10px;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid var(--accent);color:var(--accent);white-space:nowrap;flex:none}
  #tourbar .tb-badge.now{color:#9ccc65;border-color:#9ccc65}
  #tourbar .tb-title{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #tourbar .tb-step{color:var(--muted);font-size:11.5px;flex:none}
  #tourbar .tb-stage{color:var(--accent);font-size:12px;font-weight:600;flex:none;white-space:nowrap}
  #tourbar .tb-x{color:var(--muted);cursor:pointer;font-size:12.5px;flex:none}
  #tourbar .tb-x:hover{color:var(--ink)}
  @media(max-width:640px){ #tourbar{top:auto;bottom:14px} }
</style>
</head>
<body>
<div id="map"></div>
<div id="tourbar"></div>
<div id="introbox" style="display:none">
  <div class="ib-card">
    <div class="ib-eyebrow">Wells Gray Golf &amp; RV Resort</div>
    <h2 class="ib-title" id="ib-title"></h2>
    <div class="ib-body" id="ib-body"></div>
    <button class="ib-btn" id="ib-start">▶ Start the tour</button>
    <div class="ib-skip" id="ib-skip">Explore the map myself</div>
  </div>
</div>
<div id="toast"></div>
<div id="mediapanel">
  <div class="mp-head"><span class="mp-stage" id="mp-stage"></span><span class="mp-prog" id="mp-prog"></span><span class="mp-close" id="mpclose">×</span></div>
  <div class="mp-body" id="mpbody"></div>
  <div class="mp-nav"><button class="mp-back" id="mp-back">‹ Back</button><button class="mp-next" id="mp-next">Next ›</button></div>
</div>

<div id="title" class="panel">
  <h1>Wells Gray Golf &amp; RV Resort</h1>
  <div class="sub">Development master plan — phased build-out. Toggle phases, groups or layers; share the link for the same view.</div>
  <div class="brand">Clearwater, BC</div>
</div>

<div id="controls" class="panel">
  <h2>Backdrop</h2>
  <div class="basemap-row">
    <div class="bm active" data-bm="sat">Satellite</div>
    <div class="bm" data-bm="drone">Drone</div>
    <div class="bm" data-bm="topo">Topo</div>
    <div class="bm" data-bm="osm">Map</div>
  </div>
  <h2 style="margin-top:14px">Phases</h2>
  <div class="pills" id="pills"></div>
  <div id="tree"><div class="sec">Loading…</div></div>
  <div class="sec">Display</div>
  <div class="display-row">
    <button class="btn" id="copylink">🔗 Copy link to this view</button>
  </div>
  <div class="display-row">
    <label class="chk"><input type="checkbox" id="lbltoggle" checked> Show map labels</label>
  </div>
</div>

<div id="legend" class="panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map',{zoomControl:true,attributionControl:true,zoomSnap:0,zoomDelta:0.5,wheelPxPerZoomLevel:90}).setView([51.93,-120.05],14);
L.control.scale({imperial:true,metric:true}).addTo(map);
const basemaps={
  sat:L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{subdomains:['0','1','2','3'],maxZoom:22,maxNativeZoom:21,attribution:'Imagery © Google'}),
  topo:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',{maxZoom:22,maxNativeZoom:19,attribution:'© Esri'}),
  osm:L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22,maxNativeZoom:19,attribution:'© OpenStreetMap'})
};
const droneLayer=L.tileLayer('tiles/drone/{z}/{x}/{y}.webp',{minZoom:13,maxNativeZoom:20,maxZoom:22,opacity:1,
  bounds:[[51.9333,-120.0611],[51.9424,-120.0456]],attribution:'Drone orthomosaic © Mike Gilliland'});
let curBm='sat', current=basemaps.sat.addTo(map);
function setBackdrop(key,fromUrl){
  document.querySelectorAll('.bm').forEach(x=>x.classList.toggle('active',x.dataset.bm===key));
  map.removeLayer(current); map.removeLayer(droneLayer); curBm=key;
  if(key==='drone'){ current=basemaps.sat.addTo(map); droneLayer.addTo(map); }
  else { current=basemaps[key].addTo(map); }
  if(!fromUrl) writeURL();
}
document.querySelectorAll('.bm').forEach(b=>b.onclick=()=>setBackdrop(b.dataset.bm));

// ---------- state ----------
const overlays={}; let DEFS=[],GROUPS=[],TREE=null;
const NODEBYID={}; const OPTPATHS=new Set(); const DEFAULTON=new Set();
const pk=a=>a.join('|'); const gid=a=>'g_'+pk(a).replace(/[^a-z0-9]/gi,'_');
const isVis=f=>overlays[f]&&map.hasLayer(overlays[f]);

function styleObj(L,c){
  if(L.geom==='line') return {color:(c.stroke||c.fill||'#ccc'),weight:(c.weight||2.5),dashArray:(c.dash||null)};
  return {color:(c.stroke||'#fff'),weight:(c.weight!=null?c.weight:1),fillColor:(c.fill||'#888'),
          fillOpacity:(c.fillOpacity!=null?c.fillOpacity:0.55),dashArray:(c.dash||null)};
}
function pickCat(L,ft){const s=L.style; if(s.mode!=='categorized') return s;
  const v=(ft&&ft.properties)?String(ft.properties[s.field]):null;
  return (s.cats||[]).find(k=>k.v===v)||s.default||(s.cats&&s.cats[0])||{};}
function styleFor(L,ft){return styleObj(L,pickCat(L,ft));}
function pointStyleFor(L,ft){const c=pickCat(L,ft); const r=(/label/i.test(L.name))?0.1:6;
  return {radius:r,color:(c.stroke||'#fff'),weight:r<1?0:1.3,fillColor:(c.fill||'#888'),fillOpacity:(c.fillOpacity!=null?Math.max(.65,c.fillOpacity):.92)};}
const PRETTY={acres:'Area (ac)',area_ac:'Area (ac)',Name:'Name',Site:'Site',Type:'Type',Structures:'Structure',Location:'Location',Holes:'Holes',subject:'Theme',clue:'Clue',pid_formatted:'PID',owner_type:'Owner'};
function popupHtml(L,p){let rows=`<div class="pp"><div class="t">${L.name}</div>`,any=false;
  if(L.label&&p[L.label]!=null&&String(p[L.label]).trim()!=='') {rows+=`<div><b>${p[L.label]}</b></div>`;any=true;}
  (L.popup||[]).forEach(k=>{let v=p[k]; if(v==null||String(v).trim()===''||k===L.label) return;
    if(/acres/i.test(k)) v=Number(v).toFixed(1)+' ac'; const lbl=PRETTY[k]; rows+=`<div>${lbl?'<b>'+lbl+':</b> ':''}${v}</div>`;any=true;});
  if(!any) rows+=`<div style="color:var(--muted)">${L.name}</div>`; return rows+'</div>';}
function swatch(L){const s=L.style,c=(s.mode==='categorized'?(s.cats&&s.cats[0]||s.default||{}):s);
  if(L.geom==='line') return `<span class="sw line" style="border-top-color:${c.stroke||c.fill}"></span>`;
  if(c.fillOpacity!=null&&c.fillOpacity<0.06) return `<span class="sw" style="background:transparent;border:2px solid ${c.stroke||c.fill}"></span>`;
  return `<span class="sw" style="background:${c.fill||'#888'}"></span>`;}
function labelColor(L){const s=L.style,c=(s.mode==='categorized'?(s.cats&&s.cats[0]||s.default||{}):s);
  let h=(L.geom==='line'?(c.stroke||c.fill):(c.fill||c.stroke))||'#ffffff';
  const m=/^#?([0-9a-f]{6})$/i.exec(h); if(m){const n=parseInt(m[1],16),r=n>>16,g=(n>>8)&255,b=n&255;
    if(0.299*r+0.587*g+0.114*b<120) return '#f0f0f0';} return h;}
function repLayer(lyr){let arr=[];lyr.eachLayer(l=>arr.push(l));if(!arr.length)return null;
  let best=arr[0],bestA=-1;arr.forEach(l=>{let a=0;try{const b=l.getBounds();a=(b.getEast()-b.getWest())*(b.getNorth()-b.getSouth());}catch(e){a=0;}if(a>bestA){bestA=a;best=l;}});return best;}
function addLayer(L){return fetch('data/'+L.f+'.geojson').then(r=>r.json()).then(gj=>{
    // drop null/empty-geometry features — a permanent tooltip on one throws and aborts the map
    gj.features=(gj.features||[]).filter(ft=>ft&&ft.geometry&&ft.geometry.coordinates!=null&&(!Array.isArray(ft.geometry.coordinates)||ft.geometry.coordinates.length>0));
    const col=labelColor(L), dev=/label/i.test(L.name);
    const lyr=window.L.geoJSON(gj, L.geom==='point'
      ? {pointToLayer:(ft,ll)=>window.L.circleMarker(ll,pointStyleFor(L,ft)),onEachFeature:bind}
      : {style:ft=>styleFor(L,ft),onEachFeature:bind});
    function bind(ft,l){const p=ft.properties||{}; l.bindPopup(popupHtml(L,p));
      if(L.label){const v=p[L.label]; if(v!=null&&String(v).trim()!=='')
        l.bindTooltip(`<span style="color:${col}">${v}</span>`,{permanent:true,direction:'center',className:'maplbl'+(dev?' dev':'')});}}
    if(!L.label && !L.nolabel){const rep=repLayer(lyr); if(rep) rep.bindTooltip(`<span style="color:${col}">${L.name}</span>`,{permanent:true,direction:'center',className:'maplbl'});}
    overlays[L.f]=lyr; return L;
  }).catch(e=>{console.warn('load fail',L.f,e);return null;});}

// ---------- tree ----------
function buildTree(defs){const root={name:'',path:[],order:[],byName:{}};
  defs.forEach(L=>{let node=root;(L.path||[]).forEach((g,i)=>{
      if(!node.byName[g]){const c={name:g,path:L.path.slice(0,i+1),order:[],byName:{}};node.byName[g]=c;node.order.push({t:'g',n:c});NODEBYID[gid(c.path)]=c;}
      node=node.byName[g];});
    node.order.push({t:'l',L});});
  return root;}
function descSlugs(node){let out=[];node.order.forEach(it=>{if(it.t==='l')out.push(it.L.f);else out=out.concat(descSlugs(it.n));});return out;}
function descDefs(node){let out=[];node.order.forEach(it=>{if(it.t==='l')out.push(it.L);else out=out.concat(descDefs(it.n));});return out;}
function setGroupOn(node,on){const ds=descDefs(node);
  if(!on){ds.forEach(d=>setVis(d.f,false));return;}
  let t=ds.filter(d=>d.bulk&&d.on); if(!t.length)t=ds; t.forEach(d=>setVis(d.f,true));}
function nodeHtml(node,depth){depth=depth||0;let h='';node.order.forEach(it=>{
    if(it.t==='g'){const c=it.n,opt=OPTPATHS.has(pk(c.path));const coll=depth>=1?' collapsed':'';
      h+=`<div class="grp${coll}" data-gid="${gid(c.path)}"><div class="ghead"><span class="caret">▾</span>`+
         (opt?'':`<input type="checkbox" class="gchk" data-gid="${gid(c.path)}">`)+
         `<span class="gname">${c.name}</span></div><div class="gbody">${opt?optHtml(c):nodeHtml(c,depth+1)}</div></div>`;
    } else {const L=it.L; h+=`<label class="row"><input type="checkbox" class="lchk" data-f="${L.f}">${swatch(L)}<span class="nm">${L.name}</span></label>`;}
  });return h;}
function optHtml(node){const rn='opt_'+gid(node.path);
  let h=`<label class="row opt"><input type="radio" name="${rn}" value="__none"><span class="nm" style="color:var(--muted)">— none —</span></label>`;
  node.order.forEach(it=>{const nm=it.t==='g'?it.n.name:it.L.name;const val=it.t==='g'?('g:'+gid(it.n.path)):('l:'+it.L.f);
    const sw=it.t==='l'?swatch(it.L):'<span class="sw" style="background:#9ccc65"></span>';
    h+=`<label class="row opt"><input type="radio" name="${rn}" value="${val}">${sw}<span class="nm">${nm}</span></label>`;});
  return h;}

function setVis(f,on){const lyr=overlays[f];if(!lyr)return; if(on){if(!map.hasLayer(lyr))lyr.addTo(map);}else{if(map.hasLayer(lyr))map.removeLayer(lyr);}}
function optSlugs(node){ // value -> slugs map for an options group
  const m={__none:[]}; node.order.forEach(it=>{ if(it.t==='g') m['g:'+gid(it.n.path)]=descSlugs(it.n); else m['l:'+it.L.f]=[it.L.f]; }); return m;}

function refresh(){ // sync all checkboxes/radios/pills from actual map state
  buildLegend();
  // layer checkboxes
  document.querySelectorAll('.lchk').forEach(cb=>cb.checked=isVis(cb.dataset.f));
  // group tri-state
  document.querySelectorAll('.gchk').forEach(cb=>{const n=NODEBYID[cb.dataset.gid];const d=descSlugs(n);const on=d.filter(isVis).length;
    cb.checked=on>0&&on===d.length; cb.indeterminate=on>0&&on<d.length;});
  // options radios
  OPTPATHS.forEach(p=>{const n=NODEBYID['g_'+p.replace(/[^a-z0-9]/gi,'_')];if(!n)return;const sm=optSlugs(n);
    let sel='__none'; for(const v in sm){if(v!=='__none'&&sm[v].length&&sm[v].every(isVis)){sel=v;break;}}
    const r=document.querySelector(`input[name="opt_${gid(n.path)}"][value="${CSS.escape(sel)}"]`); if(r)r.checked=true;});
  // phase pills
  document.querySelectorAll('.pill').forEach(p=>{const n=NODEBYID[p.dataset.gid];const d=descSlugs(n);const on=d.filter(isVis).length;
    p.classList.toggle('on',on===d.length&&d.length>0); p.classList.toggle('partial',on>0&&on<d.length);});
}
function wire(){
  document.querySelectorAll('.caret,.gname').forEach(el=>el.onclick=e=>{e.currentTarget.closest('.grp').classList.toggle('collapsed');});
  document.querySelectorAll('.lchk').forEach(cb=>cb.onchange=()=>{setVis(cb.dataset.f,cb.checked);refresh();writeURL();});
  document.querySelectorAll('.gchk').forEach(cb=>cb.onchange=()=>{
      setGroupOn(NODEBYID[cb.dataset.gid],cb.checked);refresh();writeURL();});
  document.querySelectorAll('.row.opt input[type=radio]').forEach(r=>r.onchange=()=>{
      const node=NODEBYID[r.name.slice(4)]; const sm=optSlugs(node); const chosen=sm[r.value]||[];
      Object.values(sm).flat().forEach(f=>setVis(f,chosen.includes(f))); refresh(); writeURL();});
  document.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{const node=NODEBYID[p.dataset.gid];
      const anyOn=descSlugs(node).some(isVis); setGroupOn(node,!anyOn); refresh(); writeURL();});
}
function buildPills(){document.getElementById('pills').innerHTML=GROUPS.map(g=>
  `<span class="pill" data-gid="${gid([g])}">${shortPhase(g)}</span>`).join('');}
function shortPhase(g){const m=g.match(/Phase\s*(\d+)/i); return m?('Phase '+m[1]):g.split(/[\s\-—]/)[0];}

// ---------- URL state (diff from defaults) ----------
let urlT=null;
function writeURL(){ if(urlT)clearTimeout(urlT); urlT=setTimeout(()=>{
  const cur=new Set(DEFS.map(d=>d.f).filter(isVis));
  const add=[...cur].filter(f=>!DEFAULTON.has(f)), rem=[...DEFAULTON].filter(f=>!cur.has(f));
  const c=map.getCenter(); const parts=['b='+curBm,'v='+map.getZoom()+','+c.lat.toFixed(5)+','+c.lng.toFixed(5)];
  if(add.length)parts.push('on='+add.join(',')); if(rem.length)parts.push('off='+rem.join(','));
  history.replaceState(null,'','#'+parts.join('&'));
},120); }
function readURL(){const h=location.hash.replace(/^#/,'');if(!h)return null;const o={};
  h.split('&').forEach(kv=>{const i=kv.indexOf('=');if(i<0)return;o[kv.slice(0,i)]=decodeURIComponent(kv.slice(i+1));});return o;}
map.on('moveend zoomend',()=>writeURL());

document.getElementById('copylink').onclick=()=>{writeURL();setTimeout(()=>{
  navigator.clipboard.writeText(location.href).then(()=>toast('Link copied — sets layers, backdrop & view')).catch(()=>toast('Copy failed'));},160);};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
document.getElementById('lbltoggle').onchange=e=>document.body.classList.toggle('nolabels',!e.target.checked);
const CABNAMES={small:'Small cabin',medium:'Medium cabin',hill:'Hill cabin',cliffside:'Cliffside (hempcrete)'};
function lgSwatch(geom,st){const fill=st.fill||'#ccc',stroke=st.stroke||'#fff';
  if(geom==='line')return `<span class="lg-sw lg-line" style="background:${stroke}"></span>`;
  if(geom==='point')return `<span class="lg-sw lg-dot" style="background:${fill};border-color:${stroke}"></span>`;
  return `<span class="lg-sw lg-poly" style="background:${st.fillOpacity===0?'transparent':fill};border-color:${stroke}"></span>`;}
function cap(s){s=String(s);return s.charAt(0).toUpperCase()+s.slice(1);}
// Contextual legend: colours/structures for whatever layers are currently visible.
function buildLegend(){const el=document.getElementById('legend'); if(!el)return;
  const seen=new Set(); let rows='';
  DEFS.forEach(d=>{ if(!isVis(d.f)) return;
    if(/label/i.test(d.name)) return;                 // skip text-label layers
    if(d.label && d.geom==='point') return;           // skip point name-markers (hub names, landings…)
    const s=d.style||{};
    if(s.mode==='categorized'){
      (s.cats||[]).forEach(c=>{const lab=(d.f==='cabins'?(CABNAMES[c.v]||c.v):(d.name+' · '+cap(c.v)));
        const key=lab+'|'+c.fill; if(seen.has(key))return; seen.add(key);
        rows+=`<div class="lg-row">${lgSwatch(d.geom,c)}<span>${lab}</span></div>`;});
    } else {
      const key=d.name+'|'+(s.fill||'')+(s.stroke||''); if(seen.has(key))return; seen.add(key);
      rows+=`<div class="lg-row">${lgSwatch(d.geom,s)}<span>${d.name}</span></div>`;
    }});
  if(!rows){el.style.display='none';return;}
  el.innerHTML='<div class="lg-h">Legend · visible</div><div class="lg-list">'+rows+'</div>'; el.style.display='block';}

// ---------- init ----------
fetch('data/manifest.json').then(r=>r.json()).then(M=>{
  DEFS=M.layers||[]; GROUPS=M.groups||[];
  DEFS.forEach(d=>{const p1=/^Phase 1/i.test((d.path&&d.path[0])||''); if(p1 && d.bulk && !(d.path||[]).some(x=>/utilities/i.test(x))) DEFAULTON.add(d.f); if(d.exclusive)OPTPATHS.add(d.exclusive);});
  const pkey=g=>{const m=/Phase\s*(\d+)/i.exec(g);return m?+m[1]:99;};
  GROUPS.sort((a,b)=>pkey(a)-pkey(b));
  TREE=buildTree(DEFS);
  TREE.order.sort((a,b)=>pkey(a.t==='g'?a.n.name:'')-pkey(b.t==='g'?b.n.name:''));
  document.getElementById('tree').innerHTML=nodeHtml(TREE,0);
  buildPills();
  return Promise.all(DEFS.map(addLayer));
}).then(()=>{
  const u=readURL();
  let visible=new Set(DEFAULTON);
  if(u){ if(u.on)u.on.split(',').forEach(f=>visible.add(f)); if(u.off)u.off.split(',').forEach(f=>visible.delete(f)); }
  DEFS.forEach(d=>setVis(d.f, visible.has(d.f)));
  wire(); refresh();
  if(u&&u.b) setBackdrop(u.b,true);
  if(u&&u.v){const[z,la,ln]=u.v.split(',').map(Number); if(!isNaN(z)) map.setView([la,ln],z);}
  else fitView();
}).catch(e=>{document.getElementById('tree').innerHTML='<div class="sec">Failed to load map data.</div>';console.error(e);});

function fitView(){let b=null;const parcel=DEFS.find(d=>/parcel/i.test(d.name));
  const pick=parcel&&overlays[parcel.f]?[overlays[parcel.f]]:Object.values(overlays);
  pick.forEach(l=>{try{const lb=l.getBounds();if(lb.isValid())b=b?b.extend(lb):L.latLngBounds(lb.getSouthWest(),lb.getNorthEast());}catch(e){}});
  if(b&&b.isValid())map.fitBounds(b.pad(0.06));}

// ---------- guided tour ----------
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderWrite(t){return (t||'').split(/\n\n+/).map(p=>'<p>'+escHtml(p).replace(/\n/g,'<br>')+'</p>').join('');}
function closeMedia(){document.getElementById('mediapanel').classList.remove('open');
  document.body.classList.remove('media-open'); setTimeout(()=>map.invalidateSize(),300);}
document.getElementById('mpclose').onclick=closeMedia;

let TOUR=[], tourIdx=-1;
function tourPanel(s){
  document.getElementById('mp-stage').textContent=s.stage||'';
  document.getElementById('mp-prog').textContent=(tourIdx+1)+' / '+TOUR.length;
  const isNow=/operating/i.test(s.badge||'');
  const isDiv=s.kind==='divider';
  let h='<div class="slide'+(isDiv?' divider':'')+'">';
  if(isDiv){ h+='<div class="s-phase"><span class="s-phase-k">'+escHtml(s.stageLabel||s.stage||'')+'</span><span class="s-phase-rule"></span></div>'; }
  else { h+='<div class="s-eyebrow">'+(s.badge?'<span class="s-badge'+(isNow?' now':'')+'">'+escHtml(s.badge)+'</span>':'')+'</div>'; }
  h+='<h2 class="s-title">'+escHtml(s.title||'')+'</h2>';
  const img=s.image||(s.images&&s.images[0]);
  if(img){ h+='<figure><img class="s-img" data-src="'+img+'" src="'+img+'">'+(s.caption?'<figcaption class="s-cap">'+escHtml(s.caption)+'</figcaption>':'')+'</figure>'; }
  if(s.lead) h+='<p class="s-lead">'+escHtml(s.lead)+'</p>';
  if(s.points&&s.points.length) h+='<ul class="s-points">'+s.points.map(pt=>'<li>'+escHtml(pt)+'</li>').join('')+'</ul>';
  if(s.body) h+='<div class="mp-write">'+renderWrite(s.body)+'</div>';
  if(s.cta) h+='<a class="s-cta" href="'+s.cta.href+'" target="_blank" rel="noopener">'+escHtml(s.cta.label)+'</a>';
  h+='</div>';
  const body=document.getElementById('mpbody'); body.innerHTML=h; body.scrollTop=0;
  body.querySelectorAll('img').forEach(im=>im.onerror=()=>{const x=im.getAttribute('data-src')||'';im.outerHTML='<div class="s-ph">Image — '+x+'</div>';});
  const mp=document.getElementById('mediapanel'); const wasOpen=mp.classList.contains('open'); mp.scrollTop=0; mp.classList.add('open');
  document.body.classList.add('media-open'); if(!wasOpen) setTimeout(()=>map.invalidateSize(),300);
  const last=tourIdx>=TOUR.length-1;
  const bk=document.getElementById('mp-back'), nx=document.getElementById('mp-next');
  bk.disabled=(tourIdx<=0); bk.onclick=()=>goStop(tourIdx-1);
  nx.textContent=last?'Finish ✓':'Next ›'; nx.onclick=()=>{ if(last) endTour(); else goStop(tourIdx+1); };
  document.getElementById('mpclose').onclick=endTour;
}
function tourShow(slugs){ DEFS.forEach(d=>setVis(d.f,false)); (slugs||[]).concat(['wells_gray_golf_rv_parcel']).forEach(f=>setVis(f,true)); refresh(); }
function zoomForHeight(b){ const cz=map.getZoom(); const cl=b.getCenter().lng;
  const pN=map.project([b.getNorth(),cl],cz), pS=map.project([b.getSouth(),cl],cz);
  const pxH=Math.abs(pS.y-pN.y)||1; const z=cz+Math.log2((map.getSize().y||700)/pxH);
  return Math.min(map.getMaxZoom(), Math.max(0, z-0.05)); }
function tourFit(s){
 try{
  if(s.fit==='property'){ const l=overlays['wells_gray_golf_rv_parcel']; if(l){ const b=l.getBounds(); if(b.isValid()){ map.flyTo(b.getCenter(), zoomForHeight(b), {duration:1.3}); return; } } fitView(); return; }
  if(s.center && s.center.length===2){ map.flyTo([s.center[1],s.center[0]],(s.zoom!=null?s.zoom:18),{duration:1.3}); return; }
  if(s.fit==='all'){ fitView(); return; }
  const slugs=(s.fit&&s.fit.length)?s.fit:(s.layers||[]); let b=null;
  slugs.forEach(f=>{const l=overlays[f]; if(!l)return; try{const lb=l.getBounds(); if(lb.isValid()) b=b?b.extend(lb):L.latLngBounds(lb.getSouthWest(),lb.getNorthEast());}catch(e){}});
  if(b&&b.isValid()) map.flyToBounds(b.pad(0.22),{duration:1.3}); else fitView();
 }catch(e){ try{fitView()}catch(_){ } }
}
let tourPing=null;
function clearPing(){ if(tourPing){ map.removeLayer(tourPing); tourPing=null; } }
function showPing(ll){ clearPing(); const icon=L.divIcon({className:'tp-wrap',html:'<div class="tour-ping"><span class="ring r1"></span><span class="ring r2"></span><span class="dot"></span></div>',iconSize:[90,90],iconAnchor:[45,45]});
  tourPing=L.marker(ll,{icon,interactive:false,keyboard:false,zIndexOffset:6000}).addTo(map); }
function stopFocus(s){ if(s.center&&s.center.length===2) return L.latLng(s.center[1],s.center[0]);
  let b=null; (s.layers||[]).forEach(f=>{const l=overlays[f]; if(l){try{const lb=l.getBounds(); if(lb.isValid()) b=b?b.extend(lb):L.latLngBounds(lb.getSouthWest(),lb.getNorthEast());}catch(e){}}});
  return b&&b.isValid()? b.getCenter() : null; }
function goStop(i){ if(i<0||i>=TOUR.length) return; tourIdx=i; const s=TOUR[i];
  const firstOpen=!document.getElementById('mediapanel').classList.contains('open');
  tourShow(s.layers); tourPanel(s); renderBar();
  const fit=()=>{ tourFit(s); if(s.fit==='all'||s.fit==='property'){ clearPing(); } else { const fp=stopFocus(s); fp?showPing(fp):clearPing(); } };
  if(firstOpen) setTimeout(fit,360); else fit(); }
function startTour(){ if(TOUR.length) goStop(0); }
function endTour(){ tourIdx=-1; clearPing(); closeMedia(); DEFS.forEach(d=>setVis(d.f, DEFAULTON.has(d.f))); refresh(); fitView(); renderBar(); }
function renderBar(){ const bar=document.getElementById('tourbar'); if(!bar) return;
  if(tourIdx<0){ bar.style.display='flex'; bar.innerHTML='<button class="tb-btn" id="tb-start">▶ Take the tour</button>';
    const b=document.getElementById('tb-start'); if(b) b.onclick=startTour; }
  else { bar.style.display='none'; }
}
fetch('data/tour.json').then(r=>r.json()).then(M=>{
  TOUR=[];
  if(M.stages){ M.stages.forEach(st=>(st.stops||[]).forEach(s=>{ s.stage=st.name; s.badge=st.badge; TOUR.push(s); })); }
  else { TOUR=M.stops||[]; }
  renderBar();
  if(M.intro){
    document.getElementById('ib-title').textContent=M.intro.title||'';
    document.getElementById('ib-body').innerHTML=renderWrite(M.intro.body||'');
    if(M.intro.button) document.getElementById('ib-start').textContent=M.intro.button;
    const ib=document.getElementById('introbox'); ib.style.display='flex';
    document.getElementById('ib-start').onclick=()=>{ib.style.display='none'; startTour();};
    document.getElementById('ib-skip').onclick=()=>{ib.style.display='none';};
  }
}).catch(e=>{console.warn('tour load',e); renderBar();});
</script>
</body>
